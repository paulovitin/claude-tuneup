name: release

# Cut a release by pushing a SemVer tag:  git tag v1.2.3 && git push origin v1.2.3
# The workflow extracts the matching CHANGELOG.md section and publishes a GitHub Release.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Tests must pass before anything is published.
      - run: node --test

      - name: Build release notes from CHANGELOG
        env:
          TAG: ${{ github.ref_name }}
        run: node tools/changelog-section.mjs "$TAG" > RELEASE_NOTES.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md --verify-tag
